syntax = "proto3";

package nn_proto;

// 激活函数类型
enum ActivationType {
    ACT_ORIGIN = 0;
    ACT_RELU = 1;
    ACT_SIGMOID = 2;
    ACT_SOFTMAX = 3;
    ACT_LAYERNORM = 4;
    ACT_NONE = 5;
}

// 单个权重矩阵 W
message WeightMetrix {
    int32 rows = 1;
    int32 cols = 2;
    bytes data = 3;
}

// 一层网络
message Layer {
    int32 neuron_count = 1;
    ActivationType activation = 2;
    bytes b = 3;
}

// 整个神经网络
message Network {
    int32 layer_count = 1;
    repeated Layer layers = 2;
    repeated WeightMetrix metrixs = 3;
}